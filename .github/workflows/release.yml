name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: swift build -c release --product GhDashboard

      - name: Assemble app bundle
        run: |
          APP=GhDashboard.app
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp .build/release/GhDashboard "$APP/Contents/MacOS/GhDashboard"
          ICON=Sources/GhDashboard/Resources/AppIcon.icns
          if [[ -f "$ICON" ]]; then cp "$ICON" "$APP/Contents/Resources/AppIcon.icns"; fi
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GhDashboard</string>
              <key>CFBundleIdentifier</key>
              <string>com.ghdashboard.app</string>
              <key>CFBundleName</key>
              <string>GhDashboard</string>
              <key>CFBundleDisplayName</key>
              <string>GH Dashboard</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.developer-tools</string>
          </dict>
          </plist>
          PLIST

      - name: Sign release bundle
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash ./scripts/sign-release-bundle.sh

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent GhDashboard.app GhDashboard.zip

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          rm -f GhDashboard.dmg
          hdiutil create \
            -volname "GH Dashboard ${VERSION}" \
            -srcfolder GhDashboard.app \
            -ov -format UDZO \
            GhDashboard.dmg

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GhDashboard.zip
            GhDashboard.dmg
          generate_release_notes: true
